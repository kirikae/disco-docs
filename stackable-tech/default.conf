server {
    listen 80;
    absolute_redirect off;
    root /usr/share/nginx/html;
    index index.html index.htm;

    # ES module files (.mjs) must be served with a JS MIME type, or the browser
    # refuses the `<script type="module">` import used to load the vendored
    # Mermaid library. nginx's default mime.types maps .js but not .mjs.
    location ~ \.mjs$ {
        default_type application/javascript;
    }

    # Antora builds with `html_extension_style: indexify`, so pages are emitted
    # as `foo/index.html` and linked with a trailing slash. try_files also keeps
    # a `.html` fallback for any static redirect pages Antora writes.
    location / {
        try_files $uri $uri.html $uri/index.html $uri/ =404;
    }
}
