server {
    listen 80;
    absolute_redirect off;
    root /usr/share/nginx/html;
    index index.html index.htm;

    # Antora builds with `html_extension_style: indexify`, so pages are emitted
    # as `foo/index.html` and linked with a trailing slash. try_files also keeps
    # a `.html` fallback for any static redirect pages Antora writes.
    location / {
        try_files $uri $uri.html $uri/index.html $uri/ =404;
    }
}
