name: Build and push offline docs image
description: >
  Shared tail for the offline-docs site builds: set up Buildx, log in to GHCR,
  and build+push the site image with the standard :latest and :<version> tags
  plus registry-backed BuildKit cache.
inputs:
  image:
    description: Image name under ghcr.io/<owner>/ (e.g. "istio-offline-docs").
    required: true
  context:
    description: Docker build context path (e.g. "./istio-io").
    required: true
  version-tag:
    description: Immutable tag for this build (typically the upstream short commit SHA).
    required: true
  build-args:
    description: Optional newline-separated build args forwarded to docker build.
    required: false
    default: ""
  build-secrets:
    description: Optional newline-separated BuildKit secrets (id=VALUE) forwarded to docker build.
    required: false
    default: ""
runs:
  using: composite
  steps:
    - name: Compute lowercase owner
      id: owner
      shell: bash
      run: echo "owner=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ github.token }}
    - name: Build and push image
      uses: docker/build-push-action@v5
      with:
        context: ${{ inputs.context }}
        push: true
        build-args: ${{ inputs.build-args }}
        secrets: ${{ inputs.build-secrets }}
        tags: |
          ghcr.io/${{ steps.owner.outputs.owner }}/${{ inputs.image }}:latest
          ghcr.io/${{ steps.owner.outputs.owner }}/${{ inputs.image }}:${{ inputs.version-tag }}
        cache-from: type=registry,ref=ghcr.io/${{ steps.owner.outputs.owner }}/${{ inputs.image }}:buildcache
        cache-to: type=registry,ref=ghcr.io/${{ steps.owner.outputs.owner }}/${{ inputs.image }}:buildcache,mode=max
