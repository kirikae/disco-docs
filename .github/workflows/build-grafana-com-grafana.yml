name: Build Grafana offline docs
on:
  push:
    branches: [main]
    paths:
      - 'grafana-com-grafana/**'
      - '.github/workflows/build-grafana-com-grafana.yml'
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: {}
permissions:
  contents: read
  packages: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4

      - name: Checkout official Grafana repository (shallow, docs subtree only)
        uses: actions/checkout@v4
        with:
          repository: grafana/grafana
          path: grafana-com-grafana/grafana-src
          fetch-depth: 1
          sparse-checkout: |
            docs

      - name: Prepare tags and environment
        id: prep
        run: |
          cd grafana-com-grafana/grafana-src
          echo "COMMIT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "OWNER_LC=${OWNER_LC}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ./grafana-com-grafana
          file: ./grafana-com-grafana/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/grafana-offline-docs:latest
            ghcr.io/${{ env.OWNER_LC }}/grafana-offline-docs:${{ env.COMMIT_SHA }}
          cache-from: type=registry,ref=ghcr.io/${{ env.OWNER_LC }}/grafana-offline-docs:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ env.OWNER_LC }}/grafana-offline-docs:buildcache,mode=max
