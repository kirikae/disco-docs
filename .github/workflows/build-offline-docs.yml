name: Build Offline Docs

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      site_to_build:
        description: 'Select which documentation site to build'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - argo-cd-readthedocs-io
          - cert-manager-io
          - docs-ceph-com
          - fluxcd-io
          - helm-sh
          - istio-io
          - kubernetes-io
          - rabbitmq-com
          - stackable-tech
          - tekton-dev

permissions:
  contents: read
  packages: write

jobs:
  # On push, detect which site directories changed so a merge to main only
  # rebuilds the affected images instead of all ten. A change to this workflow
  # file trips every filter, forcing a full rebuild. schedule and
  # workflow_dispatch skip this job entirely and rebuild via their own guards.
  changes:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      kubernetes_io: ${{ steps.filter.outputs.kubernetes_io }}
      tekton_dev: ${{ steps.filter.outputs.tekton_dev }}
      cert_manager_io: ${{ steps.filter.outputs.cert_manager_io }}
      argo_cd_readthedocs_io: ${{ steps.filter.outputs.argo_cd_readthedocs_io }}
      fluxcd_io: ${{ steps.filter.outputs.fluxcd_io }}
      docs_ceph_com: ${{ steps.filter.outputs.docs_ceph_com }}
      helm_sh: ${{ steps.filter.outputs.helm_sh }}
      istio_io: ${{ steps.filter.outputs.istio_io }}
      rabbitmq_com: ${{ steps.filter.outputs.rabbitmq_com }}
      stackable_tech: ${{ steps.filter.outputs.stackable_tech }}
    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4

      - name: Detect changed site directories
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            kubernetes_io:
              - 'kubernetes-io/**'
              - '.github/workflows/build-offline-docs.yml'
            tekton_dev:
              - 'tekton-dev/**'
              - '.github/workflows/build-offline-docs.yml'
            cert_manager_io:
              - 'cert-manager-io/**'
              - '.github/workflows/build-offline-docs.yml'
            argo_cd_readthedocs_io:
              - 'argo-cd-readthedocs-io/**'
              - '.github/workflows/build-offline-docs.yml'
            fluxcd_io:
              - 'fluxcd-io/**'
              - '.github/workflows/build-offline-docs.yml'
            docs_ceph_com:
              - 'docs-ceph-com/**'
              - '.github/workflows/build-offline-docs.yml'
            helm_sh:
              - 'helm-sh/**'
              - '.github/workflows/build-offline-docs.yml'
            istio_io:
              - 'istio-io/**'
              - '.github/workflows/build-offline-docs.yml'
            rabbitmq_com:
              - 'rabbitmq-com/**'
              - '.github/workflows/build-offline-docs.yml'
            stackable_tech:
              - 'stackable-tech/**'
              - '.github/workflows/build-offline-docs.yml'


  build-kubernetes-io:
    needs: changes
    if: >
      !cancelled() && (
      github.event_name == 'schedule' ||
      github.event.inputs.site_to_build == 'all' ||
      github.event.inputs.site_to_build == 'kubernetes-io' ||
      (github.event_name == 'push' && needs.changes.outputs.kubernetes_io == 'true')
      )
    
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4

      - name: Checkout official Kubernetes website repository
        uses: actions/checkout@v4
        with:
          repository: kubernetes/website
          path: kubernetes-io/k8s-website
          submodules: true
          fetch-depth: 1

      - name: Prepare tags and environment
        id: prep
        run: |
          cd kubernetes-io/k8s-website
          echo "COMMIT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "OWNER_LC=${OWNER_LC}" >> $GITHUB_ENV

          DETECTED_VERSIONS=$(git ls-remote --heads origin | grep -o 'refs/heads/release-1\.[0-9]*' | sed 's|refs/heads/||' | sort -uV | tail -n 5 | tr '\n' ' ' | xargs)
          
          echo "Detected versions to build: $DETECTED_VERSIONS"
          echo "OLD_VERSIONS=$DETECTED_VERSIONS" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Kubernetes image
        uses: docker/build-push-action@v5
        with:
          context: ./kubernetes-io
          file: ./kubernetes-io/Dockerfile
          push: true
          # Pass the dynamically detected versions into the Dockerfile
          build-args: |
            OLD_VERSIONS=${{ env.OLD_VERSIONS }}
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/k8s-offline-docs:latest
            ghcr.io/${{ env.OWNER_LC }}/k8s-offline-docs:${{ env.COMMIT_SHA }}
          cache-from: type=registry,ref=ghcr.io/${{ env.OWNER_LC }}/k8s-offline-docs:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ env.OWNER_LC }}/k8s-offline-docs:buildcache,mode=max

  build-tekton-dev:
    needs: changes
    if: >
      !cancelled() && (
      github.event_name == 'schedule' ||
      github.event.inputs.site_to_build == 'all' ||
      github.event.inputs.site_to_build == 'tekton-dev' ||
      (github.event_name == 'push' && needs.changes.outputs.tekton_dev == 'true')
      )
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4

      - name: Checkout official Tekton website repository
        uses: actions/checkout@v4
        with:
          repository: tektoncd/website
          path: tekton-dev/tekton-website
          submodules: true
          fetch-depth: 1

      - name: Prepare tags and environment
        id: prep
        run: |
          cd tekton-dev/tekton-website
          echo "COMMIT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "OWNER_LC=${OWNER_LC}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Tekton image
        uses: docker/build-push-action@v5
        with:
          context: ./tekton-dev
          file: ./tekton-dev/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/tekton-offline-docs:latest
            ghcr.io/${{ env.OWNER_LC }}/tekton-offline-docs:${{ env.COMMIT_SHA }}
          cache-from: type=registry,ref=ghcr.io/${{ env.OWNER_LC }}/tekton-offline-docs:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ env.OWNER_LC }}/tekton-offline-docs:buildcache,mode=max

  build-cert-manager-docs:
    needs: changes
    if: >
      !cancelled() && (
      github.event_name == 'schedule' ||
      github.event.inputs.site_to_build == 'all' ||
      github.event.inputs.site_to_build == 'cert-manager-io' ||
      (github.event_name == 'push' && needs.changes.outputs.cert_manager_io == 'true')
      )
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4

      - name: Checkout official cert-manager website repository
        uses: actions/checkout@v4
        with:
          repository: cert-manager/website
          path: cert-manager-io/cert-manager-website # Updated path
          fetch-depth: 1

      - name: Prepare tags and environment
        id: prep
        run: |
          cd cert-manager-io/cert-manager-website # Updated path
          echo "COMMIT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "OWNER_LC=${OWNER_LC}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push cert-manager image
        uses: docker/build-push-action@v5
        with:
          context: ./cert-manager-io # Updated context
          file: ./cert-manager-io/Dockerfile # Updated path
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/cert-manager-offline-docs:latest
            ghcr.io/${{ env.OWNER_LC }}/cert-manager-offline-docs:${{ env.COMMIT_SHA }}
          cache-from: type=registry,ref=ghcr.io/${{ env.OWNER_LC }}/cert-manager-offline-docs:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ env.OWNER_LC }}/cert-manager-offline-docs:buildcache,mode=max

  build-argo-cd-docs:
    needs: changes
    if: >
      !cancelled() && (
      github.event_name == 'schedule' ||
      github.event.inputs.site_to_build == 'all' ||
      github.event.inputs.site_to_build == 'argo-cd-readthedocs-io' ||
      (github.event_name == 'push' && needs.changes.outputs.argo_cd_readthedocs_io == 'true')
      )
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4

      - name: Checkout official Argo CD repository
        uses: actions/checkout@v4
        with:
          repository: argoproj/argo-cd
          path: argo-cd-readthedocs-io/argo-cd-repo
          fetch-depth: 1

      - name: Prepare tags and environment
        id: prep
        run: |
          cd argo-cd-readthedocs-io/argo-cd-repo
          echo "COMMIT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "OWNER_LC=${OWNER_LC}" >> $GITHUB_ENV

          # Detect the top 5 release branches in DESCENDING order (highest to lowest)
          DETECTED_VERSIONS=$(git ls-remote --heads origin | grep -o 'refs/heads/release-[0-9]*\.[0-9]*' | sed 's|refs/heads/||' | sort -rV | head -n 5 | tr '\n' ' ' | xargs)
          echo "OLD_VERSIONS=$DETECTED_VERSIONS" >> $GITHUB_ENV
          echo "Detected versions to build: $DETECTED_VERSIONS"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Argo CD image
        uses: docker/build-push-action@v5
        with:
          context: ./argo-cd-readthedocs-io
          file: ./argo-cd-readthedocs-io/Dockerfile
          push: true
          # Pass the dynamically detected versions to the Dockerfile
          build-args: |
            OLD_VERSIONS=${{ env.OLD_VERSIONS }}
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/argo-cd-offline-docs:latest
            ghcr.io/${{ env.OWNER_LC }}/argo-cd-offline-docs:${{ env.COMMIT_SHA }}
          cache-from: type=registry,ref=ghcr.io/${{ env.OWNER_LC }}/argo-cd-offline-docs:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ env.OWNER_LC }}/argo-cd-offline-docs:buildcache,mode=max

  build-fluxcd-docs:
    needs: changes
    if: >
      !cancelled() && (
      github.event_name == 'schedule' ||
      github.event.inputs.site_to_build == 'all' ||
      github.event.inputs.site_to_build == 'fluxcd-io' ||
      (github.event_name == 'push' && needs.changes.outputs.fluxcd_io == 'true')
      )
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4

      - name: Checkout official FluxCD repository
        uses: actions/checkout@v4
        with:
          repository: fluxcd/website
          path: fluxcd-io/fluxcd-website
          fetch-depth: 1

      - name: Prepare tags and environment
        id: prep
        run: |
          cd fluxcd-io/fluxcd-website
          echo "COMMIT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "OWNER_LC=${OWNER_LC}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push FluxCD image
        uses: docker/build-push-action@v5
        with:
          context: ./fluxcd-io
          file: ./fluxcd-io/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/fluxcd-offline-docs:latest
            ghcr.io/${{ env.OWNER_LC }}/fluxcd-offline-docs:${{ env.COMMIT_SHA }}
          cache-from: type=registry,ref=ghcr.io/${{ env.OWNER_LC }}/fluxcd-offline-docs:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ env.OWNER_LC }}/fluxcd-offline-docs:buildcache,mode=max

  build-ceph-docs:
    needs: changes
    if: >
      !cancelled() && (
      github.event_name == 'schedule' ||
      github.event.inputs.site_to_build == 'all' ||
      github.event.inputs.site_to_build == 'docs-ceph-com' ||
      (github.event_name == 'push' && needs.changes.outputs.docs_ceph_com == 'true')
      )
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4

      # Because we are building historical branches in Docker, we must disable 
      # fetch-depth: 1 here so the Docker builder has access to the full git history!
      - name: Checkout official Ceph repository
        uses: actions/checkout@v4
        with:
          repository: ceph/ceph
          path: docs-ceph-com/ceph-repo
          fetch-depth: 0

      - name: Prepare tags and environment
        id: prep
        run: |
          cd docs-ceph-com/ceph-repo
          echo "COMMIT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "OWNER_LC=${OWNER_LC}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Ceph image
        uses: docker/build-push-action@v5
        with:
          context: ./docs-ceph-com
          file: ./docs-ceph-com/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/ceph-offline-docs:latest
            ghcr.io/${{ env.OWNER_LC }}/ceph-offline-docs:${{ env.COMMIT_SHA }}
          cache-from: type=registry,ref=ghcr.io/${{ env.OWNER_LC }}/ceph-offline-docs:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ env.OWNER_LC }}/ceph-offline-docs:buildcache,mode=max

  build-helm-docs:
    needs: changes
    if: >
      !cancelled() && (
      github.event_name == 'schedule' ||
      github.event.inputs.site_to_build == 'all' ||
      github.event.inputs.site_to_build == 'helm-sh' ||
      (github.event_name == 'push' && needs.changes.outputs.helm_sh == 'true')
      )
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4

      - name: Checkout official Helm website repository
        uses: actions/checkout@v4
        with:
          repository: helm/helm-www
          path: helm-sh/helm-www
          fetch-depth: 1

      - name: Prepare tags and environment
        id: prep
        run: |
          cd helm-sh/helm-www
          echo "COMMIT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "OWNER_LC=${OWNER_LC}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Helm image
        uses: docker/build-push-action@v5
        with:
          context: ./helm-sh
          file: ./helm-sh/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/helm-offline-docs:latest
            ghcr.io/${{ env.OWNER_LC }}/helm-offline-docs:${{ env.COMMIT_SHA }}
          cache-from: type=registry,ref=ghcr.io/${{ env.OWNER_LC }}/helm-offline-docs:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ env.OWNER_LC }}/helm-offline-docs:buildcache,mode=max

  build-istio-docs:
    needs: changes
    if: >
      !cancelled() && (
      github.event_name == 'schedule' ||
      github.event.inputs.site_to_build == 'all' ||
      github.event.inputs.site_to_build == 'istio-io' ||
      (github.event_name == 'push' && needs.changes.outputs.istio_io == 'true')
      )
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4

      - name: Checkout official Istio website repository
        uses: actions/checkout@v4
        with:
          repository: istio/istio.io
          path: istio-io/istio-website
          fetch-depth: 1

      - name: Prepare tags and environment
        id: prep
        run: |
          cd istio-io/istio-website
          echo "COMMIT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "OWNER_LC=${OWNER_LC}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Istio image
        uses: docker/build-push-action@v5
        with:
          context: ./istio-io
          file: ./istio-io/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/istio-offline-docs:latest
            ghcr.io/${{ env.OWNER_LC }}/istio-offline-docs:${{ env.COMMIT_SHA }}
          cache-from: type=registry,ref=ghcr.io/${{ env.OWNER_LC }}/istio-offline-docs:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ env.OWNER_LC }}/istio-offline-docs:buildcache,mode=max

  build-rabbitmq-docs:
    needs: changes
    if: >
      !cancelled() && (
      github.event_name == 'schedule' ||
      github.event.inputs.site_to_build == 'all' ||
      github.event.inputs.site_to_build == 'rabbitmq-com' ||
      (github.event_name == 'push' && needs.changes.outputs.rabbitmq_com == 'true')
      )
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4

      - name: Checkout official RabbitMQ website repository
        uses: actions/checkout@v4
        with:
          repository: rabbitmq/rabbitmq-website
          path: rabbitmq-com/rabbitmq-website
          fetch-depth: 1

      - name: Prepare tags and environment
        id: prep
        run: |
          cd rabbitmq-com/rabbitmq-website
          echo "COMMIT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "OWNER_LC=${OWNER_LC}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push RabbitMQ image
        uses: docker/build-push-action@v5
        with:
          context: ./rabbitmq-com
          file: ./rabbitmq-com/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/rabbitmq-offline-docs:latest
            ghcr.io/${{ env.OWNER_LC }}/rabbitmq-offline-docs:${{ env.COMMIT_SHA }}
          cache-from: type=registry,ref=ghcr.io/${{ env.OWNER_LC }}/rabbitmq-offline-docs:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ env.OWNER_LC }}/rabbitmq-offline-docs:buildcache,mode=max

  build-stackable-docs:
    needs: changes
    if: >
      !cancelled() && (
      github.event_name == 'schedule' ||
      github.event.inputs.site_to_build == 'all' ||
      github.event.inputs.site_to_build == 'stackable-tech' ||
      (github.event_name == 'push' && needs.changes.outputs.stackable_tech == 'true')
      )
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4

      # The Stackable docs are a multi-version Antora site built from every
      # release branch + recursive submodules, so the Dockerfile clones the
      # upstream repo itself rather than relying on a shallow CI checkout. We
      # only need the tip commit here to tag the image.
      - name: Prepare tags and environment
        id: prep
        run: |
          COMMIT_SHA=$(git ls-remote https://github.com/stackabletech/documentation.git HEAD | cut -c1-7)
          echo "COMMIT_SHA=${COMMIT_SHA}" >> $GITHUB_ENV

          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "OWNER_LC=${OWNER_LC}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Stackable image
        uses: docker/build-push-action@v5
        with:
          context: ./stackable-tech
          file: ./stackable-tech/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/stackable-offline-docs:latest
            ghcr.io/${{ env.OWNER_LC }}/stackable-offline-docs:${{ env.COMMIT_SHA }}
          cache-from: type=registry,ref=ghcr.io/${{ env.OWNER_LC }}/stackable-offline-docs:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ env.OWNER_LC }}/stackable-offline-docs:buildcache,mode=max
