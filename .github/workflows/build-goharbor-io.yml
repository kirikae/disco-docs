name: Build goharbor.io offline docs

on:
  push:
    branches: [main]
    paths:
      - 'goharbor-io/**'
      - '.github/workflows/build-goharbor-io.yml'
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4

      # The Dockerfile's `make prepare` step (load-docs.sh) fetches each
      # release-X branch directly from GitHub itself, so a shallow, single-
      # branch checkout here is enough.
      - name: Checkout official Harbor website repository
        uses: actions/checkout@v4
        with:
          repository: goharbor/website
          path: goharbor-io/harbor-website
          fetch-depth: 1

      - name: Prepare tags and environment
        id: prep
        run: |
          cd goharbor-io/harbor-website
          echo "COMMIT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "OWNER_LC=${OWNER_LC}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Harbor image
        uses: docker/build-push-action@v5
        with:
          context: ./goharbor-io
          file: ./goharbor-io/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/harbor-offline-docs:latest
            ghcr.io/${{ env.OWNER_LC }}/harbor-offline-docs:${{ env.COMMIT_SHA }}
          cache-from: type=registry,ref=ghcr.io/${{ env.OWNER_LC }}/harbor-offline-docs:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ env.OWNER_LC }}/harbor-offline-docs:buildcache,mode=max
