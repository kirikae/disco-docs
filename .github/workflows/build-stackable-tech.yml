name: Build stackable.tech offline docs

on:
  push:
    branches: [main]
    paths:
      - 'stackable-tech/**'
      - '.github/workflows/build-stackable-tech.yml'
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4

      # The Stackable docs are a multi-version Antora site built from every
      # release branch + recursive submodules, so the Dockerfile clones the
      # upstream repo itself rather than relying on a shallow CI checkout. We
      # only need the tip commit here to tag the image.
      - name: Prepare tags and environment
        id: prep
        run: |
          COMMIT_SHA=$(git ls-remote https://github.com/stackabletech/documentation.git HEAD | cut -c1-7)
          echo "COMMIT_SHA=${COMMIT_SHA}" >> $GITHUB_ENV

          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "OWNER_LC=${OWNER_LC}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Stackable image
        uses: docker/build-push-action@v5
        with:
          context: ./stackable-tech
          file: ./stackable-tech/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/stackable-offline-docs:latest
            ghcr.io/${{ env.OWNER_LC }}/stackable-offline-docs:${{ env.COMMIT_SHA }}
          cache-from: type=registry,ref=ghcr.io/${{ env.OWNER_LC }}/stackable-offline-docs:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ env.OWNER_LC }}/stackable-offline-docs:buildcache,mode=max
