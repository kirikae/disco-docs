name: Build prometheus.io offline docs

on:
  push:
    branches: [main]
    paths:
      - 'prometheus-io/**'
      - '.github/workflows/build-prometheus-io.yml'
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4

      - name: Checkout official Prometheus docs repository
        uses: actions/checkout@v4
        with:
          repository: prometheus/docs
          path: prometheus-io/prometheus-docs
          fetch-depth: 1

      - name: Prepare tags and environment
        id: prep
        run: |
          cd prometheus-io/prometheus-docs
          echo "COMMIT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "OWNER_LC=${OWNER_LC}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Prometheus image
        uses: docker/build-push-action@v5
        with:
          context: ./prometheus-io
          file: ./prometheus-io/Dockerfile
          push: true
          # The build's pre-build scripts fetch versioned docs and release
          # metadata for the Prometheus/Alertmanager/exporter repos from the
          # GitHub API; passing a token raises the rate limit for this from
          # 60/hour to 5000/hour. Passed as a BuildKit secret (consumed via
          # `RUN --mount=type=secret` in the Dockerfile) rather than a
          # build-arg, so it's never baked into an image layer or the pushed
          # layer-cache history.
          secrets: |
            GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/prometheus-offline-docs:latest
            ghcr.io/${{ env.OWNER_LC }}/prometheus-offline-docs:${{ env.COMMIT_SHA }}
          cache-from: type=registry,ref=ghcr.io/${{ env.OWNER_LC }}/prometheus-offline-docs:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ env.OWNER_LC }}/prometheus-offline-docs:buildcache,mode=max
