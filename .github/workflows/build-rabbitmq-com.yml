name: Build rabbitmq.com offline docs

on:
  push:
    branches: [main]
    paths:
      - 'rabbitmq-com/**'
      - '.github/workflows/build-rabbitmq-com.yml'
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4

      - name: Checkout official RabbitMQ website repository
        uses: actions/checkout@v4
        with:
          repository: rabbitmq/rabbitmq-website
          path: rabbitmq-com/rabbitmq-website
          fetch-depth: 1

      - name: Prepare tags and environment
        id: prep
        run: |
          cd rabbitmq-com/rabbitmq-website
          echo "COMMIT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Build and push
        uses: ./.github/actions/build-and-push-offline-docs
        with:
          image: rabbitmq-offline-docs
          context: ./rabbitmq-com
          version-tag: ${{ env.COMMIT_SHA }}
