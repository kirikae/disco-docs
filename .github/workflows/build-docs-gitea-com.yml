name: Build docs.gitea.com offline docs

on:
  push:
    branches: [main]
    paths:
      - 'docs-gitea-com/**'
      - '.github/workflows/build-docs-gitea-com.yml'
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4

      # The Gitea docs source is hosted on Gitea's own instance (gitea.com),
      # not GitHub, so actions/checkout (which only targets GitHub-hosted
      # repos) can't be used here — plain git clone instead.
      - name: Checkout official Gitea docs repository
        run: |
          git clone --depth 1 https://gitea.com/gitea/docs.git docs-gitea-com/gitea-docs

      - name: Prepare tags and environment
        id: prep
        run: |
          cd docs-gitea-com/gitea-docs
          echo "COMMIT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "OWNER_LC=${OWNER_LC}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Gitea image
        uses: docker/build-push-action@v5
        with:
          context: ./docs-gitea-com
          file: ./docs-gitea-com/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/gitea-offline-docs:latest
            ghcr.io/${{ env.OWNER_LC }}/gitea-offline-docs:${{ env.COMMIT_SHA }}
          cache-from: type=registry,ref=ghcr.io/${{ env.OWNER_LC }}/gitea-offline-docs:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ env.OWNER_LC }}/gitea-offline-docs:buildcache,mode=max
