name: Build Offline K8s Docs

on:
  schedule:
    # Runs automatically at 00:00 UTC every day to check for new updates
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows you to trigger the build manually from the GitHub UI

permissions:
  contents: read
  packages: write # Required to push images to GitHub Container Registry

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4

      - name: Checkout official Kubernetes website repository
        uses: actions/checkout@v4
        with:
          repository: kubernetes/website
          path: k8s-website
          submodules: true # CRITICAL: The k8s website relies heavily on git submodules
          fetch-depth: 1

      - name: Prepare tags and environment
        id: prep
        run: |
          # Get the latest commit hash from the k8s repo for tagging the Docker image
          cd k8s-website
          echo "COMMIT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          
          # GHCR requires repository owners to be entirely lowercase
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "OWNER_LC=${OWNER_LC}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: .kubernetes-io/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/disco-docs-k8s-io:latest
            ghcr.io/${{ env.OWNER_LC }}/disco-docs-k8s-io:${{ env.COMMIT_SHA }}
          # Utilizes layer caching to speed up daily builds if nothing has changed
          cache-from: type=registry,ref=ghcr.io/${{ env.OWNER_LC }}/disco-docs-k8s-io:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ env.OWNER_LC }}/disco-docs-k8s-io:buildcache,mode=max