name: Build fluxcd.io offline docs

on:
  push:
    branches: [main]
    paths:
      - 'fluxcd-io/**'
      - '.github/workflows/build-fluxcd-io.yml'
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4

      - name: Checkout official FluxCD repository
        uses: actions/checkout@v4
        with:
          repository: fluxcd/website
          path: fluxcd-io/fluxcd-website
          fetch-depth: 1

      - name: Prepare tags and environment
        id: prep
        run: |
          cd fluxcd-io/fluxcd-website
          echo "COMMIT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Build and push
        uses: ./.github/actions/build-and-push-offline-docs
        with:
          image: fluxcd-offline-docs
          context: ./fluxcd-io
          version-tag: ${{ env.COMMIT_SHA }}
