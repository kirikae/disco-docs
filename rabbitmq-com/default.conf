server {
    listen 80;
    absolute_redirect off;
    root /usr/share/nginx/html;
    index index.html index.htm;

    # RabbitMQ's site is built with `trailingSlash: false`, so pages are emitted
    # as `foo.html` alongside a `foo/` directory that has no index. A trailing-slash
    # request would otherwise match the bare directory and 403. Canonicalise to the
    # no-slash form (matching the site's own links), then let try_files resolve it.
    location ~ ^(.+)/$ {
        return 301 $1;
    }

    location / {
        # Check for exact file, then .html alias, then directory index, then 404
        try_files $uri $uri.html $uri/index.html $uri/ =404;
    }
}
