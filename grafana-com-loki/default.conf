# Loki's own content hardcodes root-relative links/aliases under
# /docs/loki/latest/ (the exact path grafana.com serves it at), so this site
# is served under that same prefix instead of root, to avoid rewriting
# thousands of internal hrefs. The only changes from the repo's usual
# default.conf are the two added redirects below ("/" and "/docs/loki/" both
# forward to the real, versioned root).
server {
    listen 80;
    absolute_redirect off;
    root /usr/share/nginx/html;
    index index.html index.htm;

    location = / {
        return 302 /docs/loki/latest/;
    }

    location = /docs/loki/ {
        return 302 /docs/loki/latest/;
    }

    location / {
        try_files $uri $uri.html $uri/index.html $uri/ =404;
    }
}
