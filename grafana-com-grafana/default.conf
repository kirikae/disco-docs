# Grafana's docs.grafana.com theme bakes the "/docs/grafana/latest/" path
# prefix into every generated permalink (root-relative, e.g.
# href="/docs/grafana/latest/administration/..."), since that's genuinely
# where the content lives inside the wider grafana.com site (Hugo's page URL
# mirrors its content path: content/docs/grafana/latest/...). Rewriting every
# such internal link to serve at "/" instead would mean patching hundreds of
# files with content the theme itself generates dynamically (menus, TOC,
# breadcrumbs, cross-references) -- fragile and easy to regress silently.
# Serving the built tree as-is under that same prefix is far more robust: it
# needs zero HTML rewriting and matches upstream's own URL scheme exactly.
# Only "/" itself is redirected, purely for convenience.
server {
    listen 80;
    absolute_redirect off;
    root /usr/share/nginx/html;
    index index.html index.htm;

    location = / {
        return 302 /docs/grafana/latest/;
    }

    location / {
        try_files $uri $uri.html $uri/index.html $uri/ =404;
    }
}
