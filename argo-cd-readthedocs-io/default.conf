server {
    listen 80;
    absolute_redirect off;
    root /usr/share/nginx/html;
    index index.html index.htm;

    # Intercept dropdown routing bugs (e.g. /v2.10/v2.9/docs -> /v2.9/docs)
    location ~ ^/(v2\.[0-9]+)/+v2\.[0-9]+(/.*)$ {
        return 301 /$1$2;
    }
    location ~ ^/(v2\.[0-9]+)/+v2\.[0-9]+$ {
        return 301 /$1/;
    }

    location / {
        try_files $uri $uri.html $uri/index.html $uri/ =404;
    }
}
