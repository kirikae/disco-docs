server {
    listen 80;
    absolute_redirect off;
    root /usr/share/nginx/html;
    index index.html index.htm;

    # 1. Version-to-version dropdown links
    location ~ ^/(v1\.[0-9]+)/+v1\.[0-9]+(/.*)$ {
        return 301 /$1$2;
    }
    location ~ ^/(v1\.[0-9]+)/+v1\.[0-9]+$ {
        return 301 /$1/;
    }

    # 2. Old-version-to-main dropdown links
    location ~ ^/main-version/+v1\.[0-9]+(/.*)$ {
        return 301 $1;
    }
    location ~ ^/main-version/+v1\.[0-9]+$ {
        return 301 /;
    }

    # 3. Direct main-version absolute links
    location ~ ^/main-version(/.*)$ {
        return 301 $1;
    }
    location ~ ^/main-version$ {
        return 301 /;
    }

    # 4. Standard routing for Hugo Static Sites
    location / {
        # Check for exact file, then .html, then directory index, then fallback to 404
        try_files $uri $uri.html $uri/index.html $uri/ =404;
    }
}