server {
    listen 80;
    absolute_redirect off;
    root /usr/share/nginx/html;
    index index.html index.htm;

    # 1. Version-to-version dropdown links (e.g. /v1.30/v1.29/docs -> /v1.30/docs)
    location ~ ^/(v1\.[0-9]+)/+v1\.[0-9]+(/.*)$ {
        return 301 /$1$2;
    }
    location ~ ^/(v1\.[0-9]+)/+v1\.[0-9]+$ {
        return 301 /$1/;
    }

    # 2. Old-version-to-main dropdown links (e.g. /main-version/v1.29/docs -> /docs)
    location ~ ^/main-version/+v1\.[0-9]+(/.*)$ {
        return 301 $1;
    }
    location ~ ^/main-version/+v1\.[0-9]+$ {
        return 301 /;
    }

    # 3. Direct main-version absolute links (e.g. /main-version/docs -> /docs)
    location ~ ^/main-version(/.*)$ {
        return 301 $1;
    }
    location ~ ^/main-version$ {
        return 301 /;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
